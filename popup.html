<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="popup.css">
    <title>LeetMemo</title>
</head>
<body>
    <main>
        <h1>LeetMemo</h1>
        <section id="profile-setup">
            <p>Enter your LeetCode username to load your profile:</p>
            <input type="text" id="username-input" placeholder="LeetCode Username">
            <button id="load-profile">Load Profile</button>
        </section>
        <section id="profile-dashboard" style="display: none;">
            <p id="status">Loading profile...</p>

            <h2 id="username">Username</h2>
            <p>Rank: <span id="ranking">-</span></p>

            <p>Streak: <span id="streak">0</span></p>
            <p>Active days: <span id="active-days">0</span></p>
            <div id="heatmap"></div>

            <ul>
                <li>Easy: <span id="easy-count">0</span></li>
                <li>Medium: <span id="medium-count">0</span></li>
                <li>Hard: <span id="hard-count">0</span></li>
            </ul>

            <ul id="recent-submissions"></ul>
        </section>
        <button id="change-user">Change Username</button>
    </main>

    <script src="popup.js"></script>
</body>
</html>
